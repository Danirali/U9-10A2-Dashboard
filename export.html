<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports Export - AI Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #87CEEB; scroll-behavior: smooth; font-family: 'Inter', sans-serif;}
        .sidebar { background-color: #000000; width: 260px; height: 100vh; position: fixed; top: 0; left: 0; border-right: 1px solid #222;}
        .sidebar a { color: #FFFFFF; text-decoration: none; padding: 12px 20px; border-radius: 8px; margin-bottom: 5px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: #87CEEB; color: #000000; font-weight: bold; }
        .main-content { margin-left: 260px; padding: 40px; }
        .figma-card { background: #121212; border-radius: 12px; border: 1px solid #222; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: transform 0.3s, box-shadow 0.3s; }
        .figma-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.8); border-color: #87CEEB;}
        h1, h2, h3, h4, h5, h6, strong, span, p, label { color: #87CEEB !important; }
        small { color: #FFFFFF; font-weight: 500; }
        .form-select, .form-check-input { background-color: #222; border-color: #444; color: #FFF; }
        .form-check-input:checked { background-color: #98FF98; border-color: #98FF98; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
        
        /* Direct Link Styling for static site */
        .btn-static { display: inline-block; text-align: center; text-decoration: none !important; }
    </style>
</head>
<body>
    <div class="sidebar p-4 d-flex flex-column">
        <h4 style="color:#87CEEB" class="mb-0">AI Tracker</h4><small class="mb-4">Retail Analytics</small>
        <a href="dashboard.html">Dashboard</a>
        <a href="zones.html">Zone Comparison</a>
        <a href="statistics.html">Statistical Analysis</a>
        <a href="export.html" class="active">Reports Export</a>
        <a href="gdpr.html">GDPR Privacy Mode</a>
    </div>

    <div class="main-content">
        <div class="mb-4 anim-up"><h2>Reports Export</h2><small>Static GitHub Pages Export Logic</small></div>

        <div class="figma-card anim-up d-1 mb-4">
            <h5 class="mb-4">Configure Export</h5>
            
            <div class="row g-4 mb-4">
                <div class="col-md-6"><label class="form-label small fw-bold">Report Type</label><select class="form-select py-2"><option>Footfall Analytics</option></select></div>
                <div class="col-md-6"><label class="form-label small fw-bold">Time Range</label><select class="form-select py-2"><option>All Time</option></select></div>
            </div>

            <label class="form-label small fw-bold mt-3">Data Fields Included</label>
            <div class="row g-3 mb-5 border-bottom border-secondary pb-4">
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" checked disabled><label class="form-check-label ms-2">Timestamp</label></div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" checked disabled><label class="form-check-label ms-2">Zone</label></div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" checked disabled><label class="form-check-label ms-2">Engagement</label></div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" checked disabled><label class="form-check-label ms-2" style="color: #666 !important;">Anonymized ID</label></div></div>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <a href="footfall_data.csv" download="Footfall_Analytics_Export.csv" class="btn btn-static w-100 py-3 fw-bold rounded-3 shadow-sm transition" style="background-color: #98FF98; color: #000;">
                        📄 Download CSV
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="Footfall_Analytics_Export.xlsx" download="Footfall_Analytics_Export.xlsx" class="btn btn-static w-100 py-3 fw-bold rounded-3 shadow-sm transition" style="background-color: #87CEEB; color: #000;">
                        📊 Download XLSX
                    </a>
                </div>
                <div class="col-md-4">
                    <button onclick="downloadPDF()" id="pdf-btn" class="btn w-100 py-3 fw-bold rounded-3 shadow-sm transition text-white" style="background-color: #ff4d4d;">
                        📑 Generate PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function downloadPDF() {
            const btn = document.getElementById('pdf-btn');
            const originalText = btn.innerText; btn.innerText = "⏳ Generating...";
            try {
                // Fetch the static CSV file
                const res = await fetch('footfall_data.csv');
                const csvText = await res.text();
                const rows = csvText.trim().split('\n').map(row => row.split(','));
                
                const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'mm', 'a4');
                doc.setFontSize(18); doc.setTextColor(20, 20, 20); doc.text("AI Footfall Tracker - Analytics Report", 14, 22);
                doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("GDPR Compliant Export", 14, 30);
                
                doc.autoTable({ startY: 40, head: [rows[0]], body: rows.slice(1, 500), theme: 'striped', headStyles: { fillColor: [135, 206, 235], textColor: [0, 0, 0] }, styles: { fontSize: 8, cellPadding: 2 } });
                doc.save('Footfall_Report.pdf');
            } catch (error) { alert("Error generating PDF."); }
            btn.innerText = originalText;
        }
    </script>
</body>
</html>
