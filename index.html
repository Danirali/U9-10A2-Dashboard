<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Tracker - Live Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #87CEEB; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .camera-container { animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1); border: 2px solid #222; border-radius: 15px; background: #121212; min-height: 60vh; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        .dash-btn { animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transition: transform 0.3s; background-color: #87CEEB; color: #000; border: none; }
        .dash-btn:hover { transform: translateY(-5px) scale(1.02); background-color: #98FF98; color: #000; }
        .pulse-dot { width: 12px; height: 12px; background: #ff4d4d; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,77,77,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,77,77,0); } 100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); } }
    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-4">
    <div class="position-absolute top-0 start-0 p-4 d-flex align-items-center gap-2">
        <div class="pulse-dot"></div><h5 class="m-0 text-uppercase tracking-wider text-white">System Active (GDPR Mode)</h5>
    </div>
    <div class="camera-container w-100 position-relative" style="max-width: 1000px;">
        <h3 style="color: #666;">🔴 Edge AI Processing Mode Active</h3>
        <span class="position-absolute bottom-0 start-0 m-3 p-2 bg-dark rounded text-white" style="font-family: monospace;">Model: YOLOv8 | Location: Store A</span>
    </div>
    <a href="dashboard.html" class="btn btn-lg mt-5 px-5 py-3 rounded-pill dash-btn fw-bold shadow">Enter Analytical Dashboard ➔</a>
</body>
</html>
